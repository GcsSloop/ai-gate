name: Dev CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-test-build:
    name: Backend Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run backend tests
        run: go test ./...

      - name: Build routerd
        run: go build ./cmd/routerd

  frontend-test-build:
    name: Frontend Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm --prefix frontend ci

      - name: Run release script tests
        run: |
          bash scripts/test/release_version_helpers_test.sh
          bash scripts/test/sync_release_metadata_test.sh
          bash scripts/test/collect_release_assets_test.sh
          bash scripts/test/package_local_release_test.sh

      - name: Run frontend tests
        run: npm --prefix frontend run test

      - name: Build frontend
        run: npm --prefix frontend run build
